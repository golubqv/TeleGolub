<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TeleGolub</title>

<link rel="stylesheet" href="css/app.css">

</head>
<body>

<div class="app">

    <!-- Левая панель -->
    <aside class="sidebar">

        <div class="logo">
            🕊️ <span>TeleGolub</span>
        </div>

        <div class="coins">
            🪙
            <span id="coins">0</span>
            TeleGolub Coins
        </div>

        <input
            id="search"
            class="search"
            type="text"
            placeholder="Поиск по @username"
            oninput="searchUser()"
        >

        <div id="searchResult"></div>

        <h3 class="title">
            Чаты
        </h3>

        <div
            id="chatList"
            class="chat-list">

        </div>

    </aside>

    <!-- Правая часть -->

    <main class="main">

        <header class="header">

            <div>

                <h2 id="username">
                    TeleGolub
                </h2>

                <span class="status">
                    🟢 В сети
                </span>

            </div>

            <button onclick="logout()">
                Выйти
            </button>

        </header>

        <div
            id="messages"
            class="messages">

        </div>

        <div class="send">

            <button
                class="gift-btn"
                onclick="openGiftStore()">

                🎁

            </button>

            <input
                id="message"
                type="text"
                placeholder="Введите сообщение..."
            >

            <button onclick="sendMessage()">
                ➤
            </button>

        </div>

    </main>

</div>

<!-- Магазин подарков -->

<div
    id="giftStore"
    class="gift-store">

    <div class="gift-window">

        <div class="gift-header">

            <h2>🎁 TeleGolub Gifts</h2>

            <button onclick="closeGiftStore()">

                ✕

            </button>

        </div>

        <div
            id="giftList"
            class="gift-list">

        </div>

    </div>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/coins.js"></script>
<script type="module" src="js/gifts.js"></script>
<script type="module" src="js/chats.js"></script>
<script type="module" src="js/chat.js"></script>
<script type="module" src="js/search.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
