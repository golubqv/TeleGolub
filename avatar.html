<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Аватар</title>

<link rel="stylesheet"
href="css/avatar.css">

</head>
<body>

<div class="avatar-page">

<h1>👤 Аватар</h1>

<input
type="file"
accept="image/*"
id="avatarInput">

<button onclick="selectAvatar()">

Загрузить

</button>

<button
onclick="location.href='settings.html'">

Назад

</button>

</div>

<script>

window.selectAvatar=()=>{

const file=document
.getElementById("avatarInput")
.files[0];

uploadAvatar(file);

}

</script>

<script type="module"
src="js/avatar.js"></script>

</body>
</html>
