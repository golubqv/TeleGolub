<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TeleGolub AI</title>

<link rel="stylesheet" href="css/ai.css">

</head>
<body>

<div class="ai-page">

    <div class="ai-header">

        <h1>🤖 TeleGolub AI</h1>

        <p>Ваш интеллектуальный помощник</p>

    </div>

    <div id="aiMessages" class="ai-messages">

        <div class="ai-message bot">

            👋 Привет! Я TeleGolub AI. Чем могу помочь?

        </div>

    </div>

    <div class="ai-send">

        <input
            id="aiInput"
            placeholder="Введите запрос...">

        <button onclick="sendAI()">

            ➤

        </button>

    </div>

    <button
        class="back"
        onclick="location.href='index.html'">

        ← Назад

    </button>

</div>

<script type="module" src="js/ai.js"></script>

</body>
</html>
