<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TeleGolub</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="css/app.css">

</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

<div class="sidebar-top">

<div class="logo">

<div class="logo-icon">

🕊️

</div>

<div class="logo-text">

<h2>TeleGolub</h2>

<span>Messenger</span>

</div>

</div>

<div class="coins-card">

<div>

<div class="coins-title">

TeleGolub Coins

</div>

<div
class="coins-value">

🪙
<span id="coins">

0

</span>

</div>

</div>

<button
class="wallet-button">

+

</button>

</div>

<div class="search-box">

<input

id="search"

type="text"

placeholder="Поиск..."

oninput="searchUser()"

>

</div>

<div

id="searchResult"

class="search-result">

</div>

</div>

<div class="chat-header">

<span>

ЧАТЫ

</span>

<button>

＋

</button>

</div>

<div

id="chatList"

class="chat-list">

<!-- Firebase -->

</div>

<div class="sidebar-bottom">

<div class="profile-preview">

<div class="profile-avatar">

👤

</div>

<div>

<div id="username">

TeleGolub

</div>

<div class="online">

🟢 В сети

</div>

</div>

</div>

<button

class="settings-button"

onclick="logout()">

Выйти

</button>

</div>

</aside>

<!-- ================= CHAT ================= -->

<main class="main">

<!-- ================= HEADER ================= -->

<header class="chat-header-top">

    <div class="chat-user">

        <div class="chat-avatar">

            👤

        </div>

        <div class="chat-user-info">

            <h2 id="chatTitle">

                TeleGolub

            </h2>

            <span
            id="userStatus">

                🟢 В сети

            </span>

        </div>

    </div>

    <div class="chat-actions">

        <button class="icon-button">

            📞

        </button>

        <button class="icon-button">

            📹

        </button>

        <button class="icon-button">

            🔍

        </button>

        <button class="icon-button">

            ⋮

        </button>

    </div>

</header>

<!-- ================= MESSAGES ================= -->

<div
id="messages"
class="messages">

<!-- Firebase -->

</div>

<!-- ================= REPLY ================= -->

<div
id="replyBox"
class="reply-box"

style="display:none;">

<div class="reply-line"></div>

<div class="reply-content">

<div
id="replyName">

Ответ

</div>

<div
id="replyText">

...

</div>

</div>

<button
class="reply-close">

✕

</button>

</div>

<!-- ================= INPUT ================= -->

<div class="send-panel">

<button
class="input-button">

😊

</button>

<button
class="input-button">

📎

</button>

<button
class="gift-button"

onclick="openGiftStore()">

🎁

</button>

<input

id="message"

type="text"

placeholder="Введите сообщение..."

>

<button

class="send-button"

onclick="sendMessage()">

➤

</button>

</div>

<!-- ================= GIFT STORE ================= -->

<div

id="giftStore"

class="gift-store">

<div class="gift-window">

<div class="gift-window-header">

<h2>

🎁 TeleGolub Gifts

</h2>

<button

onclick="closeGiftStore()">

✕

</button>

</div>

<div

id="giftList"

class="gift-list">

</div>

</div>

    </div>

    <!-- ================= IMAGE VIEWER ================= -->

<div id="imageViewer" class="image-viewer">

    <button
        class="viewer-close"
        onclick="closeImageViewer()">

        ✕

    </button>

    <img
        id="viewerImage"
        src=""
        alt="">

</div>

<!-- ================= PROFILE MODAL ================= -->

<div id="profileModal" class="profile-modal">

    <div class="profile-window">

        <div class="profile-top">

            <div class="profile-big-avatar">

                👤

            </div>

            <h2 id="profileName">

                TeleGolub User

            </h2>

            <span id="profileUsername">

                @username

            </span>

        </div>

        <div class="profile-buttons">

            <button>

                💬 Написать

            </button>

            <button>

                🎁 Подарок

            </button>

            <button>

                🚫 Заблокировать

            </button>

        </div>

        <button
            class="close-profile"
            onclick="closeProfile()">

            Закрыть

        </button>

    </div>

</div>

<!-- ================= LOADER ================= -->

<div id="loader" class="loader">

    <div class="loader-logo">

        🕊️

    </div>

    <div class="loader-text">

        TeleGolub

    </div>

</div>

<!-- ================= TOAST ================= -->

<div id="toast" class="toast">

    Готово

</div>

<!-- ================= JS ================= -->

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/auth.js"></script>

<script type="module" src="js/chat.js"></script>

<script type="module" src="js/chats.js"></script>

<script type="module" src="js/search.js"></script>

<script type="module" src="js/gifts.js"></script>

<script type="module" src="js/sendGift.js"></script>

<script type="module" src="js/coins.js"></script>

<script type="module" src="js/presence.js"></script>

<script type="module" src="js/reactions.js"></script>

<script type="module" src="js/reply.js"></script>

<script type="module" src="js/app.js"></script>

</main>

</div>

</body>

    </html>
