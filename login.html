<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TeleGolub</title>

<link rel="stylesheet" href="css/login.css">

</head>
<body>

<div class="card">

    <div class="logo">

        🕊️

        <h1>TeleGolub</h1>

        <p>Общайтесь быстро, просто и безопасно.</p>

    </div>

    <input
        id="email"
        type="email"
        placeholder="Электронная почта">

    <input
        id="password"
        type="password"
        placeholder="Пароль">

    <button onclick="register()">
        Создать аккаунт
    </button>

    <button
        class="login"
        onclick="login()">

        Войти

    </button>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
