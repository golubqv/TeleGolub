<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Профиль | TeleGolub</title>

<link rel="stylesheet" href="css/profile.css">

</head>
<body>

<div class="profile">

    <div class="cover"></div>

    <div class="avatar">

        <span id="avatarLetter">?</span>

    </div>

    <h1 id="name">Загрузка...</h1>

    <p id="username">@username</p>

    <p id="bio">
        Нет описания
    </p>

    <div class="stats">

        <div class="card">

            <h2 id="coins">0</h2>

            <span>🪙 Coins</span>

        </div>

        <div class="card">

            <h2 id="level">1</h2>

            <span>⭐ Level</span>

        </div>

        <div class="card">

            <h2 id="pro">

                Free

            </h2>

            <span>💎 Plan</span>

        </div>

    </div>

    <button onclick="location.href='index.html'">

        ← Назад

    </button>

</div>

<script type="module" src="js/profile.js"></script>

</body>
</html>
